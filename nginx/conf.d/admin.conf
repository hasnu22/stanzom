# HTTP -> HTTPS redirect
server {
    listen 80;
    server_name admin.stanzom.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Admin panel
server {
    listen 443 ssl http2;
    server_name admin.stanzom.com;

    ssl_certificate     /etc/letsencrypt/live/admin.stanzom.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.stanzom.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Rate limit admin panel
    limit_req zone=general burst=30 nodelay;

    # Restrict admin to specific IPs (uncomment and add your IPs)
    # allow 203.0.113.0/24;
    # deny all;

    location / {
        proxy_pass http://admin;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://admin;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
